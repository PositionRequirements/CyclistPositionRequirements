<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PMA / PFA Error Lookup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <p class="eyebrow">Static Lookup Tool</p>
        <h1>PMA / PFA Error Calculator</h1>
        <p class="intro">
          Enter a mean and a standard deviation between <strong>0.01</strong> and
          <strong>1.00</strong>. The tool rounds each input to the nearest table
          entry and reads the matching error values from a local JSON file.
        </p>

        <form id="lookup-form" class="form">
          <label class="field">
            <span>Mean</span>
            <input
              id="mean"
              name="mean"
              type="number"
              min="0.01"
              max="1"
              step="0.01"
              placeholder="0.35"
              required
            />
          </label>

          <label class="field">
            <span>Standard Deviation</span>
            <input
              id="std"
              name="std"
              type="number"
              min="0.01"
              max="1"
              step="0.01"
              placeholder="0.12"
              required
            />
          </label>

          <button type="submit" id="lookup-button">Calculate Errors</button>
        </form>

        <p id="status" class="status" aria-live="polite">Loading lookup table…</p>

        <section class="results" aria-live="polite">
          <article class="result-card">
            <p class="result-label">PMA</p>
            <p id="pma-value" class="result-value">--</p>
          </article>

          <article class="result-card">
            <p class="result-label">PFA</p>
            <p id="pfa-value" class="result-value">--</p>
          </article>
        </section>

        <p id="lookup-meta" class="meta">No lookup performed yet.</p>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
